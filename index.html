function calcBMI(w,h){ if(!w||!h) return 0; return +(w/((h/100)**2)).toFixed(1); }
function bmiLabel(b){ if(b<18.5) return["Underweight",T.cyan]; if(b<25) return["Normal",T.green]; if(b<30) return["Overweight",T.amber]; return["Obese",T.red]; }
function calcCalGoal(w,h,age,gender,activity,goal){
  if(!w) return 2000;
  const bmr = gender==="Female"?10*w+6.25*h-5*age-161:10*w+6.25*h-5*age+5;
  const af = {Sedentary:1.2,Light:1.375,Moderate:1.55,Active:1.725,VeryActive:1.9}[activity]||1.55;
  const tdee = bmr*af;
  const adj = {"Fat Loss":-500,Cutting:-600,"Muscle Gain":300,Bulking:500,Strength:200,Maintain:0}[goal]||0;
  return Math.round(tdee+adj);
}
function calcProtein(w,goal){
  const mul = {"Muscle Gain":2.2,Bulking:2.0,Strength:2.0,Cutting:2.4,"Fat Loss":1.8,Maintain:1.6}[goal]||1.8;
  return Math.round((w||70)*mul);
}

// ─── AI API ───────────────────────────────────────────────────────────────────
async function callAI(messages, systemPrompt, json=false){
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:systemPrompt,messages})
    });
    const data = await res.json();
    const text = (data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("");
    if(json){ const cleaned=text.replace(/```json|```/g,"").trim(); return JSON.parse(cleaned); }
    return text;
  } catch(e){ return json?null:"AI se response nahi aaya. Please try again."; }
}

// ─── Firebase Hooks ───────────────────────────────────────────────────────────
function useFirestore(collection, uid){
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    if(!uid){ setLoading(false); return; }
    const unsub = db.collection(collection).doc(uid).onSnapshot(snap=>{
      setData(snap.exists ? snap.data() : {});
      setLoading(false);
    });
    return ()=>unsub();
  },[collection,uid]);
  const save = useCallback(async(newData)=>{
    if(!uid) return;
    await db.collection(collection).doc(uid).set(newData,{merge:true});
  },[collection,uid]);
  return [data,save,loading];
}

// ─── SVG Charts ───────────────────────────────────────────────────────────────
function LineChart({data,goal,color=T.purple}){
  if(!data||data.length<2) return <div style={{color:T.dim,textAlign:"center",padding:"40px 0",fontSize:"13px"}}>Not enough data yet</div>;
  const W=320,H=140,pad=30;
  const vals=data.map(d=>d.value);
  const mn=Math.min(...vals,goal||Infinity)*0.9;
  const mx=Math.max(...vals,goal||0)*1.1||10;
  const px=i=>pad+(i/(data.length-1))*(W-pad*2);
  const py=v=>H-pad-((v-mn)/(mx-mn))*(H-pad*2);
  const pts=data.map((d,i)=>`${px(i)},${py(d.value)}`).join(" ");
  const fillPts=`${px(0)},${H-pad} ${pts} ${px(data.length-1)},${H-pad}`;
  const gid=`g${Math.random().toString(36).slice(2)}`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={fillPts} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
      {goal&&<line x1={pad} y1={py(goal)} x2={W-pad} y2={py(goal)} stroke={T.amber} strokeWidth="1.5" strokeDasharray="5,4"/>}
      {data.map((d,i)=><text key={i} x={px(i)} y={H-6} textAnchor="middle" fill={T.dim} fontSize="9">{d.label}</text>)}
      <circle cx={px(data.length-1)} cy={py(vals[vals.length-1])} r="5" fill={color} stroke={T.bg} strokeWidth="2"/>
    </svg>
  );
}
function BarChart({data,color=T.purple}){
  if(!data||data.length===0) return null;
  const mx=Math.max(...data.map(d=>d.value),1);
  return(
    <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80,padding:"0 4px"}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:"100%",background:color+"33",borderRadius:"4px 4px 0 0",position:"relative",height:60}}>
            <div style={{position:"absolute",bottom:0,left:0,right:0,background:color,borderRadius:"4px 4px 0 0",height:`${(d.value/mx)*100}%`,transition:"height .4s"}}/>
          </div>
          <div style={{fontSize:9,color:T.dim,textAlign:"center"}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ─── WORKOUT TAB ──────────────────────────────────────────────────────────────
function WorkoutTab({profile,userData,saveData}){
  const [view,setView]=useState("calendar");
  const [session,setSession]=useState(null);
  const [bodyPart,setBodyPart]=useState("Chest");
  const [search,setSearch]=useState("");
  const [restTimer,setRestTimer]=useState(null);
  const [restLeft,setRestLeft]=useState(0);
  const [postModal,setPostModal]=useState(false);
  const [rating,setRating]=useState(4);
  const [pump,setPump]=useState("Great");
  const [aiAnalysis,setAiAnalysis]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [toast,setToast]=useState("");
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  const workouts=userData?.workouts||{};

  useEffect(()=>{
    if(!restTimer) return;
    setRestLeft(restTimer);
    const id=setInterval(()=>setRestLeft(p=>{if(p<=1){clearInterval(id);setRestTimer(null);return 0;}return p-1;}),1000);
    return()=>clearInterval(id);
  },[restTimer]);

  function startSession(date=today()){
    const existing=workouts[date];
    setSession(existing?{...existing,date}:{date,exercises:[],mood:"Motivated"});
    setView("session");
  }

  function addExercise(name){
    if(session?.exercises?.some(e=>e.name===name)){showToast("Already added!");return;}
    setSession(p=>({...p,exercises:[...(p.exercises||[]),{name,sets:[],id:uid()}]}));
  }
  function removeExercise(id){setSession(p=>({...p,exercises:p.exercises.filter(e=>e.id!==id)}));}
  function addSet(exId){setSession(p=>({...p,exercises:p.exercises.map(e=>e.id===exId?{...e,sets:[...e.sets,{reps:10,weight:20,done:false}]}:e)}));}
  function updateSet(exId,si,field,val){setSession(p=>({...p,exercises:p.exercises.map(e=>e.id===exId?{...e,sets:e.sets.map((s,i)=>i===si?{...s,[field]:field==="done"?val:+val}:s)}:e)}));}
  function removeSet(exId,si){setSession(p=>({...p,exercises:p.exercises.map(e=>e.id===exId?{...e,sets:e.sets.filter((_,i)=>i!==si)}:e)}));}
  function calc1RM(sets){return sets.reduce((b,s)=>{const rm=s.weight*(1+s.reps/30);return rm>b?rm:b;},0).toFixed(1);}

  async function saveSession(){
    if(!session?.exercises?.length){showToast("❌ Koi exercise nahi ki!");return;}
    const saved={...session,savedAt:new Date().toISOString(),rating,pump};
    const updated={...userData,workouts:{...(userData?.workouts||{}),[session.date]:saved}};
    await saveData(updated);
    setPostModal(false);
    setAiLoading(true);
    const summary=session.exercises.map(e=>`${e.name}: ${e.sets.length} sets`).join(", ");
    const analysis=await callAI([{role:"user",content:`Workout: ${summary}. Goal: ${profile.goal}. Rating: ${rating}/5.`}],
      `FitPro AI coach. Give honest workout feedback in Hinglish. Max 80 words. No markdown.`);
    setAiAnalysis(analysis);
    setAiLoading(false);
    setView("analysis");
  }

  const now=new Date();
  const year=now.getFullYear(),month=now.getMonth();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();

  if(view==="analysis") return(
    <div style={{padding:"0 16px 100px"}}>
      <Toast msg={toast}/>
      <Btn variant="ghost" onClick={()=>setView("calendar")} small style={{marginBottom:16}}>← Back</Btn>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:800,fontSize:16,marginBottom:10}}>🏋️ Workout Saved!</div>
        {aiLoading?<div style={{display:"flex",gap:8,alignItems:"center",color:T.muted,fontSize:"13px"}}><TypingDots/> AI analysis...</div>
          :aiAnalysis?<div style={{background:`${T.purple}11`,borderRadius:T.r,padding:12,fontSize:"14px",lineHeight:1.7}}>{aiAnalysis}</div>:null}
      </Card>
      {session?.exercises?.map(e=>(
        <Card key={e.id} style={{marginBottom:10}}>
          <div style={{fontWeight:700,marginBottom:6}}>{e.name}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {e.sets.map((s,i)=><div key={i} style={{background:T.bg3,borderRadius:8,padding:"6px 10px",fontSize:"12px"}}>Set {i+1}: {s.reps}×{s.weight}kg</div>)}
          </div>
          {e.sets.length>0&&<div style={{fontSize:"12px",color:T.purple,marginTop:6}}>1RM: ~{calc1RM(e.sets)} kg</div>}
        </Card>
      ))}
      <Btn onClick={()=>setView("calendar")} style={{width:"100%"}}>Done ✓</Btn>
    </div>
  );

  if(view==="session") return(
    <div style={{padding:"0 16px 100px"}}>
      <Toast msg={toast}/>
      {postModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <Card style={{width:"100%",maxWidth:360}}>
            <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>🎉 Workout Complete!</div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:"13px",color:T.muted,marginBottom:8}}>Rating</div>
              <div style={{display:"flex",gap:8}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>setRating(n)} style={{fontSize:24,background:"none",border:"none",cursor:"pointer",opacity:n<=rating?1:0.3}}>⭐</button>)}</div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:"13px",color:T.muted,marginBottom:8}}>Pump Feel</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["Amazing","Great","Good","Meh","Tired"].map(p=><Chip key={p} label={p} active={pump===p} onClick={()=>setPump(p)}/>)}</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn variant="ghost" onClick={()=>setPostModal(false)} style={{flex:1}}>Cancel</Btn>
              <Btn onClick={saveSession} style={{flex:2}}>Save & Analyze 🤖</Btn>
            </div>
          </Card>
        </div>
      )}
      {restTimer&&(
        <div style={{background:`${T.purple}22`,border:`1px solid ${T.purple}44`,borderRadius:T.r,padding:"12px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontWeight:700,color:T.purple}}>⏱ Rest</span>
          <span style={{fontSize:24,fontWeight:900,color:restLeft<=10?T.red:T.text}}>{restLeft}s</span>
          <Btn small variant="ghost" onClick={()=>{setRestTimer(null);setRestLeft(0);}}>Stop</Btn>
        </div>
      )}
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <Btn variant="ghost" onClick={()=>setView("calendar")} small>←</Btn>
        <Btn onClick={()=>setPostModal(true)} style={{flex:1}} small>🏁 Finish</Btn>
      </div>
      <div style={{marginBottom:14}}>
        <div style={{fontSize:"12px",color:T.muted,marginBottom:8}}>⏱ Rest Timer</div>
        <div style={{display:"flex",gap:8}}>{[60,90,120,180].map(t=><Btn key={t} small variant="secondary" onClick={()=>setRestTimer(t)}>{t}s</Btn>)}</div>
      </div>
      {session?.exercises?.map(ex=>(
        <Card key={ex.id} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontWeight:700}}>{ex.name}</div>
            <button onClick={()=>removeExercise(ex.id)} style={{background:"none",border:"none",color:T.red,cursor:"pointer",fontSize:16}}>✕</button>
          </div>
          {ex.sets.map((s,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,background:s.done?`${T.green}11`:T.bg3,borderRadius:10,padding:"8px 10px"}}>
              <span style={{fontSize:"12px",color:T.muted,minWidth:32}}>Set {i+1}</span>
              <input type="number" value={s.reps} onChange={e=>updateSet(ex.id,i,"reps",e.target.value)} style={{width:48,background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,color:T.text,padding:"4px 6px",textAlign:"center",fontFamily:T.font,fontSize:"13px"}}/>
              <span style={{fontSize:"11px",color:T.dim}}>reps</span>
              <input type="number" value={s.weight} onChange={e=>updateSet(ex.id,i,"weight",e.target.value)} style={{width:52,background:"transparent",border:`1px solid ${T.border}`,borderRadius:8,color:T.text,padding:"4px 6px",textAlign:"center",fontFamily:T.font,fontSize:"13px"}}/>
              <span style={{fontSize:"11px",color:T.dim}}>kg</span>
              <button onClick={()=>updateSet(ex.id,i,"done",!s.done)} style={{fontSize:18,background:"none",border:"none",cursor:"pointer"}}>{s.done?"✅":"⭕"}</button>
              <button onClick={()=>removeSet(ex.id,i)} style={{background:"none",border:"none",color:T.dim,cursor:"pointer"}}>✕</button>
            </div>
          ))}
          {ex.sets.length>0&&<div style={{fontSize:"11px",color:T.purple,marginBottom:8}}>1RM: ~{calc1RM(ex.sets)} kg</div>}
          <Btn small variant="ghost" onClick={()=>addSet(ex.id)}>+ Set</Btn>
        </Card>
      ))}
      <Card style={{marginTop:14}}>
        <div style={{fontWeight:700,marginBottom:10}}>+ Add Exercise</div>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:10}}>
          {BODY_PARTS.map(bp=><Chip key={bp} label={bp} active={bodyPart===bp} onClick={()=>setBodyPart(bp)}/>)}
        </div>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
          style={{width:"100%",background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:"10px 12px",fontFamily:T.font,fontSize:"14px",outline:"none",marginBottom:10,boxSizing:"border-box"}}/>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {EXERCISES[bodyPart]?.filter(e=>e.toLowerCase().includes(search.toLowerCase())).map(e=>(
            <Chip key={e} label={e} active={session?.exercises?.some(ex=>ex.name===e)} onClick={()=>addExercise(e)}/>
          ))}
        </div>
      </Card>
    </div>
  );

  return(
    <div style={{padding:"0 16px 100px"}}>
      <Toast msg={toast}/>
      <Card style={{marginBottom:16}}>
        <div style={{fontWeight:800,marginBottom:14,textAlign:"center"}}>{now.toLocaleString("en-IN",{month:"long",year:"numeric"})}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,textAlign:"center",marginBottom:8}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{fontSize:"11px",color:T.dim,fontWeight:700}}>{d}</div>)}
          {Array(firstDay).fill(null).map((_,i)=><div key={i}/>)}
          {Array(daysInMonth).fill(null).map((_,i)=>{
            const d=i+1;
            const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const hasW=workouts[dateStr];
            const isToday=dateStr===today();
            return(
              <div key={d} onClick={()=>startSession(dateStr)} style={{padding:"6px 2px",borderRadius:8,cursor:"pointer",background:isToday?`${T.purple}33`:"transparent",border:isToday?`1px solid ${T.purple}`:"1px solid transparent"}}>
                <div style={{fontSize:"13px",fontWeight:isToday?800:400,color:isToday?T.purple:T.text}}>{d}</div>
                {hasW&&<div style={{width:5,height:5,borderRadius:"50%",background:T.purple,margin:"2px auto 0"}}/>}
              </div>
            );
          })}
        </div>
      </Card>
      <Btn onClick={()=>startSession(today())} style={{width:"100%",marginBottom:14}}>
        {workouts[today()]?"✏️ Edit Today's Workout":"🏋️ Start Workout"}
      </Btn>
      <div style={{fontWeight:700,marginBottom:10}}>Recent Workouts</div>
      {Object.entries(workouts).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5).map(([d,w])=>(
        <Card key={d} onClick={()=>{setSession({...w,date:d});setView("session");}} style={{marginBottom:8,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div><div style={{fontWeight:700,fontSize:"14px"}}>{fmtDate(d)}</div><div style={{fontSize:"12px",color:T.muted}}>{w.exercises?.length||0} exercises</div></div>
            <Badge label={`${w.rating||"?"}⭐`} color={T.amber}/>
          </div>
        </Card>
      ))}
    </div>
  );
}

// ─── SLEEP TAB ────────────────────────────────────────────────────────────────
function SleepTab({profile,userData,saveData}){
  const [bedtime,setBedtime]=useState("23:00");
  const [waketime,setWaketime]=useState("06:30");
  const [quality,setQuality]=useState("Good");
  const [toast,setToast]=useState("");
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  function calcHours(bed,wake){
    const [bh,bm]=bed.split(":").map(Number);
    const [wh,wm]=wake.split(":").map(Number);
    let mins=(wh*60+wm)-(bh*60+bm);
    if(mins<0) mins+=1440;
    return +(mins/60).toFixed(1);
  }

  async function logSleep(){
    const hours=calcHours(bedtime,waketime);
    const updated={...userData,sleep:{...(userData?.sleep||{}),[today()]:{bedtime,waketime,hours,quality}}};
    await saveData(updated);
    showToast("✅ Sleep logged!");
  }

  const sleep=userData?.sleep||{};
  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const key=d.toISOString().split("T")[0];
    return{label:d.toLocaleDateString("en-IN",{weekday:"short"}),value:sleep[key]?.hours||0};
  });

  return(
    <div style={{padding:"0 16px 100px"}}>
      <Toast msg={toast}/>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:14}}>😴 Log Sleep</div>
        <Input label="Bedtime" value={bedtime} onChange={setBedtime} type="time"/>
        <Input label="Wake Time" value={waketime} onChange={setWaketime} type="time"/>
        <div style={{background:`${T.purple}11`,borderRadius:T.r,padding:12,marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:32,fontWeight:900,color:T.purple}}>{calcHours(bedtime,waketime)}h</div>
          <div style={{fontSize:"12px",color:T.muted}}>Sleep duration</div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:"12px",color:T.muted,marginBottom:8,fontWeight:600,textTransform:"uppercase"}}>Quality</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {["Excellent","Good","Fair","Poor"].map(q=><Chip key={q} label={q} active={quality===q} onClick={()=>setQuality(q)}/>)}
          </div>
        </div>
        <Btn onClick={logSleep} style={{width:"100%"}}>💤 Log Sleep</Btn>
      </Card>
      <Card>
        <div style={{fontWeight:700,marginBottom:14}}>Last 7 Days</div>
        <BarChart data={last7} color={T.cyan}/>
      </Card>
    </div>
  );
}

// ─── WATER TAB ────────────────────────────────────────────────────────────────
function WaterTab({profile,userData,saveData}){
  const todayWater=userData?.water?.[today()]||0;
  const goal=profile.waterGoal||3;

  async function add(amt){
    const updated={...userData,water:{...(userData?.water||{}),[today()]:+((todayWater+amt).toFixed(2))}};
    await saveData(updated);
  }
  async function reset(){
    const updated={...userData,water:{...(userData?.water||{}),[today()]:0}};
    await saveData(updated);
  }

  const glasses=Math.round(todayWater/0.25);
  const totalGlasses=Math.round(goal/0.25);

  return(
    <div style={{padding:"0 16px 100px"}}>
      <Card style={{marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:"12px",color:T.muted,marginBottom:8}}>TODAY'S WATER</div>
        <div style={{fontSize:52,fontWeight:900,background:"linear-gradient(135deg,#06b6d4,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{todayWater.toFixed(1)}L</div>
        <div style={{color:T.muted,fontSize:"14px",marginBottom:16}}>Goal: {goal}L</div>
        <ProgressBar value={todayWater} max={goal} color={T.cyan} height={16} style={{marginBottom:16}}/>
        <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:6}}>
          {Array.from({length:Math.min(totalGlasses,16)},(_,i)=><span key={i} style={{fontSize:22,opacity:i<glasses?1:0.2}}>🥤</span>)}
        </div>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12}}>Quick Add</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"+100ml",amt:0.1},{label:"+250ml",amt:0.25},{label:"+500ml",amt:0.5},{label:"+1L",amt:1}].map(b=>(
            <Btn key={b.label} variant="secondary" onClick={()=>add(b.amt)}>{b.label} 💧</Btn>
          ))}
        </div>
      </Card>
      <div style={{display:"flex",gap:10}}>
        <Card style={{flex:1,textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:T.cyan}}>{glasses}</div><div style={{fontSize:"11px",color:T.muted}}>Glasses</div></Card>
        <Card style={{flex:1,textAlign:"center"}}><div style={{fontSize:22,fontWeight:900}}>{Math.max(0,goal-todayWater).toFixed(1)}L</div><div style={{fontSize:"11px",color:T.muted}}>Remaining</div></Card>
        <Btn variant="ghost" onClick={reset} style={{flex:1}}>🔄 Reset</Btn>
      </div>
      {todayWater>=goal&&<Card style={{marginTop:14,background:`${T.green}11`,border:`1px solid ${T.green}33`,textAlign:"center"}}><div style={{fontSize:28,marginBottom:6}}>🎉</div><div style={{color:T.green,fontWeight:700}}>Hydration goal complete!</div></Card>}
    </div>
  );
}

// ─── STEPS TAB ────────────────────────────────────────────────────────────────
function StepsTab({userData,saveData}){
  const [custom,setCustom]=useState("");
  const [toast,setToast]=useState("");
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const todaySteps=userData?.steps?.[today()]||0;

  async function add(n){
    const updated={...userData,steps:{...(userData?.steps||{}),[today()]:(todaySteps+n)}};
    await saveData(updated);
  }
  async function setManual(){
    const n=parseInt(custom);
    if(!isNaN(n)&&n>=0){
      const updated={...userData,steps:{...(userData?.steps||{}),[today()]:n}};
      await saveData(updated);
      setCustom("");showToast("✅ Steps updated!");
    }
  }

  const last7=Array.from({length:7},(_,i)=>{
    const d=new Date();d.setDate(d.getDate()-(6-i));
    const key=d.toISOString().split("T")[0];
    return{label:d.toLocaleDateString("en-IN",{weekday:"short"}),value:userData?.steps?.[key]||0};
  });

  return(
    <div style={{padding:"0 16px 100px"}}>
      <Toast msg={toast}/>
      <Card style={{marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:52,fontWeight:900,background:T.gradGreen,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{todaySteps.toLocaleString()}</div>
        <div style={{color:T.muted,marginBottom:14}}>steps • goal: 10,000</div>
        <ProgressBar value={todaySteps} max={10000} color={T.green} height={14} style={{marginBottom:16}}/>
        <div style={{display:"flex",justifyContent:"center",gap:24}}>
          <div><div style={{fontSize:20,fontWeight:800,color:T.amber}}>{Math.round(todaySteps*0.04)}</div><div style={{fontSize:"11px",color:T.muted}}>kcal</div></div>
          <div><div style={{fontSize:20,fontWeight:800,color:T.cyan}}>{(todaySteps*0.0008).toFixed(2)}km</div><div style={{fontSize:"11px",color:T.muted}}>distance</div></div>
        </div>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:12}}>Quick Add</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"+1k",n:1000},{label:"+2.5k",n:2500},{label:"+5k",n:5000},{label:"+7.5k",n:7500}].map(b=>(
            <Btn key={b.label} variant="secondary" onClick={()=>add(b.n)}>{b.label} 👟</Btn>
          ))}
        </div>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:10}}>Set Manually</div>
        <div style={{display:"flex",gap:8}}>
          <input value={custom} onChange={e=>setCustom(e.target.value)} type="number" placeholder="Enter steps..."
            style={{flex:1,background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:"10px 12px",fontFamily:T.font,fontSize:"14px",outline:"none"}}/>
          <Btn onClick={setManual} small>Set</Btn>
        </div>
      </Card>
      <Card><div style={{fontWeight:700,marginBottom:14}}>Last 7 Days</div><BarChart data={last7} color={T.green}/></Card>
    </div>
  );
}

// ─── AI COACH ─────────────────────────────────────────────────────────────────
function AICoachTab({profile,userData}){
  const [messages,setMessages]=useState([{role:"assistant",content:`Namaste ${profile.name}! 🙏 Main hun aapka FitPro AI coach. Hindi, English, ya Hinglish mein poochho! 💪`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages,loading]);

  const todayNutrition=userData?.nutrition?.[today()]||{};
  const totalCal=Object.values(todayNutrition).reduce((s,m)=>s+(m.macros?.calories||0),0);

  const systemPrompt=`You are FitPro AI coach for Indian users. User: ${profile.name}, Age: ${profile.age}, Weight: ${profile.weight}kg, Goal: ${profile.goal}, Diet: ${profile.diet}, BMI: ${calcBMI(profile.weight,profile.height)}. Today: Calories=${totalCal}/${profile.calGoal}, Water=${userData?.water?.[today()]||0}L, Steps=${userData?.steps?.[today()]||0}. Reply in Hinglish or English (match user's language). Under 80 words. Friendly, honest. No markdown. Add emojis.`;

  async function sendMessage(){
    if(!input.trim()||loading) return;
    const userMsg={role:"user",content:input};
    setMessages(p=>[...p,userMsg]);
    setInput("");setLoading(true);
    const history=messages.slice(-10).concat([userMsg]).map(m=>({role:m.role,content:m.content}));
    const reply=await callAI(history,systemPrompt);
    setMessages(p=>[...p,{role:"assistant",content:reply}]);
    setLoading(false);
  }

  const quickQs=["Aaj ka workout kaisa raha?","Mujhe Indian diet plan do","Protein kaise badhau?","Weight loss tips do","BMI theek hai kya?"];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 130px)"}}>
      <div style={{flex:1,overflowY:"auto",padding:"0 16px 8px"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:12}}>
            {m.role==="assistant"&&<div style={{width:32,height:32,borderRadius:"50%",background:T.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,marginRight:8,flexShrink:0}}>🤖</div>}
            <div style={{maxWidth:"80%",background:m.role==="user"?T.grad:T.card,color:T.text,borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:"14px",lineHeight:1.7,border:m.role==="user"?"none":`1px solid ${T.border}`}}>{m.content}</div>
          </div>
        ))}
        {loading&&<div style={{display:"flex",marginBottom:12}}><div style={{width:32,height:32,borderRadius:"50%",background:T.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,marginRight:8}}>🤖</div><div style={{background:T.card,borderRadius:"18px 18px 18px 4px",padding:"12px 16px",border:`1px solid ${T.border}`}}><TypingDots/></div></div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"8px 16px",borderTop:`1px solid ${T.border}`}}>
        <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:8}}>
          {quickQs.map(q=><button key={q} onClick={()=>setInput(q)} style={{background:T.bg3,border:`1px solid ${T.border}`,color:T.muted,borderRadius:99,padding:"6px 12px",fontSize:"12px",cursor:"pointer",whiteSpace:"nowrap",fontFamily:T.font}}>{q}</button>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMessage()} placeholder="Hindi, English, Hinglish mein..."
            style={{flex:1,background:T.bg3,border:`1px solid ${T.border}`,borderRadius:T.r,color:T.text,padding:"12px 14px",fontSize:"14px",fontFamily:T.font,outline:"none"}}/>
          <Btn onClick={sendMessage} disabled={loading||!input.trim()} style={{width:48,padding:0,fontSize:20}}>➤</Btn>
        </div>
      </div>
    </div>
  );
}

// ─── PROGRESS TAB ─────────────────────────────────────────────────────────────
function ProgressTab({profile,userData}){
  const [chartType,setChartType]=useState("calories");
  const last14=Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));return d.toISOString().split("T")[0];});
  const nutrition=userData?.nutrition||{};
  const sleep=userData?.sleep||{};
  const water=userData?.water||{};
  const steps=userData?.steps||{};
  const workouts=userData?.workouts||{};

  const chartData={
    calories:last14.map(d=>({label:fmtDate(d).split(" ")[0],value:Object.values(nutrition[d]||{}).reduce((s,m)=>s+(m.macros?.calories||0),0)})),
    protein:last14.map(d=>({label:fmtDate(d).split(" ")[0],value:Object.values(nutrition[d]||{}).reduce((s,m)=>s+(m.macros?.protein||0),0)})),
    sleep:last14.map(d=>({label:fmtDate(d).split(" ")[0],value:sleep[d]?.hours||0})),
    water:last14.map(d=>({label:fmtDate(d).split(" ")[0],value:water[d]||0})),
    steps:last14.map(d=>({label:fmtDate(d).split(" ")[0],value:steps[d]||0})),
    sets:last14.map(d=>({label:fmtDate(d).split(" ")[0],value:(workouts[d]?.exercises||[]).reduce((s,e)=>s+e.sets.length,0)})),
  };
  const goals={calories:profile.calGoal,protein:profile.protGoal,sleep:profile.sleepGoal||7,water:profile.waterGoal||3,steps:10000,sets:15};
  const colors={calories:T.amber,protein:T.purple,sleep:T.cyan,water:T.cyan,steps:T.green,sets:T.pink};
  const activeDays=last14.filter(d=>(workouts[d]?.exercises||[]).length>0).length;
  const avgCal=Math.round(chartData.calories.filter(d=>d.value>0).reduce((s,d)=>s+d.value,0)/(chartData.calories.filter(d=>d.value>0).length||1));

  return(
    <div style={{padding:"0 16px 100px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        <Card style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:T.purple}}>{activeDays}</div><div style={{fontSize:"11px",color:T.muted}}>Active Days</div></Card>
        <Card style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:T.amber}}>{avgCal}</div><div style={{fontSize:"11px",color:T.muted}}>Avg Cal</div></Card>
        <Card style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:900,color:T.green}}>{userData?.streak||0}</div><div style={{fontSize:"11px",color:T.muted}}>Streak</div></Card>
      </div>
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
        {[{id:"calories",label:"🔥 Cal"},{id:"protein",label:"💪 Prot"},{id:"sleep",label:"😴 Sleep"},{id:"water",label:"💧 Water"},{id:"steps",label:"👟 Steps"},{id:"sets",label:"🏋️ Sets"}].map(t=><Chip key={t.id} label={t.label} active={chartType===t.id} onClick={()=>setChartType(t.id)}/>)}
      </div>
      <Card>
        <div style={{fontWeight:700,marginBottom:4}}>14-Day Trend</div>
        <div style={{fontSize:"12px",color:T.muted,marginBottom:14}}>Yellow dashed = goal</div>
        <LineChart data={chartData[chartType]} goal={goals[chartType]} color={colors[chartType]}/>
      </Card>
    </div>
  );
}

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({profile,userData,saveData,sub,user}){
  const [form,setForm]=useState({...profile});
  const [toast,setToast]=useState("");
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  async function save(){
    const updated={...form,weight:+form.weight,height:+form.height,age:+form.age,calGoal:+form.calGoal||calcCalGoal(+form.weight,+form.height,+form.age,form.gender,form.activity,form.goal),protGoal:+form.protGoal||calcProtein(+form.weight,form.goal),waterGoal:+form.waterGoal||3};
    await db.collection("users").doc(user.uid).set(updated,{merge:true});
    showToast("✅ Saved!");
  }

  async function logout(){
    await auth.signOut();
    window.location.reload();
  }

  const statusColor=sub?.status==="active"?T.green:sub?.status==="trial"?T.amber:T.red;
  const statusLabel=sub?.status==="active"?"Active":sub?.status==="trial"?`Trial (${Math.max(0,Math.ceil((new Date(sub.trialEnd)-Date.now())/86400000))}d left)`:"Expired";

  return(
    <div style={{padding:"0 16px 100px"}}>
      <Toast msg={toast}/>
      <Card style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontWeight:700}}>Subscription</div>
          <Badge label={statusLabel} color={statusColor}/>
        </div>
        <div style={{fontSize:"12px",color:T.muted}}>{user.email}</div>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:14}}>👤 Profile</div>
        <Input label="Name" value={form.name||""} onChange={v=>setForm(p=>({...p,name:v}))}/>
        <Input label="Age" value={form.age||""} onChange={v=>setForm(p=>({...p,age:v}))} type="number"/>
        <Input label="Height (cm)" value={form.height||""} onChange={v=>setForm(p=>({...p,height:v}))} type="number"/>
        <Input label="Weight (kg)" value={form.weight||""} onChange={v=>setForm(p=>({...p,weight:v}))} type="number"/>
        <Select label="Gender" value={form.gender||"Male"} onChange={v=>setForm(p=>({...p,gender:v}))} options={["Male","Female","Other"]}/>
      </Card>
      <Card style={{marginBottom:14}}>
        <div style={{fontWeight:700,marginBottom:14}}>🎯 Goals</div>
        <Select label="Fitness Goal" value={form.goal||"Maintain"} onChange={v=>setForm(p=>({...p,goal:v}))} options={["Fat Loss","Muscle Gain","Strength","Cutting","Bulking","Maintain"]}/>
        <Input label="Calorie Goal" value={form.calGoal||""} onChange={v=>setForm(p=>({...p,calGoal:v}))} type="number"/>
        <Input label="Protein Goal (g)" value={form.protGoal||""} onChange={v=>setForm(p=>({...p,protGoal:v}))} type="number"/>
        <Input label="Water Goal (L)" value={form.waterGoal||""} onChange={v=>setForm(p=>({...p,waterGoal:v}))} type="number" step="0.5"/>
      </Card>
      <Btn onClick={save} style={{width:"100%",marginBottom:12}}>💾 Save Changes</Btn>
      <Btn variant="danger" onClick={logout} style={{width:"100%"}}>🚪 Logout</Btn>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function FitPro(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [userData,setUserData]=useState(null);
  const [dataLoading,setDataLoading]=useState(true);
  const [activeTab,setActiveTab]=useState("home");
  const [showAdmin,setShowAdmin]=useState(false);
  const [logoTaps,setLogoTaps]=useState(0);
  const [toast,setToast]=useState({msg:"",type:"info"});
  const tapTimer=useRef();
  const showToast=(msg,type="info")=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:"info"}),2500);};

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);});
    return()=>unsub();
  },[]);

  useEffect(()=>{
    if(!user){setDataLoading(false);return;}
    const unsub=db.collection("users").doc(user.uid).onSnapshot(snap=>{
      if(snap.exists) setUserData(snap.data());
      setDataLoading(false);
    });
    return()=>unsub();
  },[user]);

  async function saveData(updated){
    if(!user) return;
    await db.collection("users").doc(user.uid).set(updated,{merge:true});
  }

  function handleLogoTap(){
    clearTimeout(tapTimer.current);
    setLogoTaps(p=>{
      const next=p+1;
      if(next>=5){
        if(userData?.isAdmin||user?.email===ADMIN_EMAIL){setShowAdmin(true);}
        else{showToast("❌ Admin access nahi hai!","error");}
        return 0;
      }
      tapTimer.current=setTimeout(()=>setLogoTaps(0),2000);
      return next;
    });
  }

  if(authLoading||dataLoading) return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:T.font}}>
      <div style={{fontSize:48,marginBottom:16}}>💪</div>
      <Spinner/>
      <div style={{color:T.muted,marginTop:12,fontSize:"14px"}}>Loading FitPro AI...</div>
    </div>
  );

  if(!user) return <AuthScreen onAuth={u=>{setUser(u);}}/>;
  if(!userData?.setupDone) return <Onboarding user={user} onDone={p=>setUserData(p)}/>;

  const profile=userData;
  const sub=userData?.sub||{};
  const isActive=sub.status==="active"||(sub.status==="trial"&&new Date(sub.trialEnd)>Date.now());
  if(!isActive) return <Paywall user={user} profile={profile} onActivate={()=>window.location.reload()}/>;

  const subStatus=sub.status==="active"?"Active":`Trial (${Math.max(0,Math.ceil((new Date(sub.trialEnd)-Date.now())/86400000))}d)`;
  const subColor=sub.status==="active"?T.green:T.amber;

  const TABS=[{id:"home",icon:"🏠",label:"Home"},{id:"workout",icon:"🏋️",label:"Workout"},{id:"nutrition",icon:"🍽️",label:"Food"},{id:"ai",icon:"🤖",label:"AI Coach"},{id:"more",icon:"⋯",label:"More"}];
  const MORE_TABS=[{id:"sleep",icon:"😴",label:"Sleep"},{id:"water",icon:"💧",label:"Water"},{id:"steps",icon:"👟",label:"Steps"},{id:"progress",icon:"📈",label:"Progress"},{id:"settings",icon:"⚙️",label:"Settings"}];
  const isMoreTab=MORE_TABS.some(t=>t.id===activeTab);

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:T.font,color:T.text,maxWidth:480,margin:"0 auto",position:"relative"}}>
      <Toast msg={toast.msg} type={toast.type}/>
      {showAdmin&&<AdminPanel onClose={()=>setShowAdmin(false)}/>}

      {/* WhatsApp Floating Button */}
      <a href={`https://wa.me/${WHATSAPP}?text=Hi! I need help with FitPro AI. Name: ${profile.name}`} target="_blank"
        style={{position:"fixed",bottom:90,right:16,zIndex:300,width:52,height:52,borderRadius:"50%",background:"#25D366",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,textDecoration:"none",boxShadow:"0 4px 16px rgba(37,211,102,0.4)"}}>
        💬
      </a>

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:`${T.bg}ee`,backdropFilter:"blur(12px)",borderBottom:`1px solid ${T.border}`,padding:"52px 20px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}} onClick={handleLogoTap}>
          <div style={{width:36,height:36,borderRadius:10,background:T.grad,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer"}}>💪</div>
          <div>
            <div style={{fontWeight:800,fontSize:16,lineHeight:1}}>FitPro AI</div>
            <div style={{fontSize:"11px",color:T.muted}}>Hey {profile.name}! 👋</div>
          </div>
        </div>
        <Badge label={subStatus} color={subColor}/>
      </div>

      {/* Tab Content */}
      <div style={{paddingTop:8,minHeight:"calc(100vh - 130px)"}}>
        {activeTab==="home"&&<DashboardTab profile={profile} userData={userData} sub={sub}/>}
        {activeTab==="workout"&&<WorkoutTab profile={profile} userData={userData} saveData={saveData}/>}
        {activeTab==="nutrition"&&<NutritionTab profile={profile} userData={userData} saveData={saveData}/>}
        {activeTab==="ai"&&<AICoachTab profile={profile} userData={userData}/>}
        {activeTab==="sleep"&&<SleepTab profile={profile} userData={userData} saveData={saveData}/>}
        {activeTab==="water"&&<WaterTab profile={profile} userData={userData} saveData={saveData}/>}
        {activeTab==="steps"&&<StepsTab userData={userData} saveData={saveData}/>}
        {activeTab==="progress"&&<ProgressTab profile={profile} userData={userData}/>}
        {activeTab==="settings"&&<SettingsTab profile={profile} userData={userData} saveData={saveData} sub={sub} user={user}/>}
        {activeTab==="more"&&(
          <div style={{padding:"0 16px 100px"}}>
            <div style={{fontWeight:700,fontSize:18,marginBottom:16}}>More Features</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {MORE_TABS.map(t=><Card key={t.id} onClick={()=>setActiveTab(t.id)} style={{textAlign:"center",cursor:"pointer",padding:"20px 16px"}}><div style={{fontSize:32,marginBottom:8}}>{t.icon}</div><div style={{fontWeight:700,fontSize:"14px"}}>{t.label}</div></Card>)}
            </div>
          </div>
        )}
      </div>

      {isMoreTab&&<button onClick={()=>setActiveTab("more")} style={{position:"fixed",top:56,left:20,zIndex:50,background:T.bg3,border:`1px solid ${T.border}`,color:T.muted,borderRadius:T.r,padding:"6px 12px",fontSize:"12px",cursor:"pointer",fontFamily:T.font}}>← Back</button>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:`${T.bg2}f0`,backdropFilter:"blur(16px)",borderTop:`1px solid ${T.border}`,display:"flex",padding:"8px 0 24px",zIndex:200}}>
        {TABS.map(t=>{
          const isActive=t.id==="more"?(activeTab==="more"||isMoreTab):activeTab===t.id;
          return(
            <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:T.font}}>
              <div style={{fontSize:22,filter:isActive?"none":"grayscale(0.5)",opacity:isActive?1:0.6}}>{t.icon}</div>
              <div style={{fontSize:"10px",fontWeight:700,color:isActive?T.purple:T.dim,letterSpacing:".3px"}}>{t.label}</div>
              {isActive&&<div style={{width:4,height:4,borderRadius:"50%",background:T.purple}}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FitPro/>);
  </script>
</body>
